<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penghitung Keuangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Pencatatan Keuangan</h1>
            <p class="text-sm text-gray-500">Catat biar gak boncos le</p>
        </div>

        <form id="expenseForm" class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Jenis Transaksi</label>
                <select id="type" class="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="expense"> Pengeluaran</option>
                    <option value="income"> Pemasukan</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nominal (Rp)</label>
                <input type="number" id="amount" placeholder="Contoh: 15000" required
                    class="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                <input type="text" id="category" placeholder="Contoh: Makan, Bensin, Game" required
                    class="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Catatan</label>
                <input type="text" id="description" placeholder="Catatan tambahan (opsional)"
                    class="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg p-2.5 transition duration-200 shadow-md">
                Simpan Transaksi
            </button>
        </form>

        <hr class="border-gray-200 my-4">

        <div>
            <h3 class="text-lg font-bold text-gray-800 mb-3">Riwayat Transaksi</h3>
            <div id="transactionList" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                </div>
        </div>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
